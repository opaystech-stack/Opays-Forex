<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accès Restreint — OpaysFox</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'SF Pro Text',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f9fb;padding:24px}
@keyframes lockPulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(79,70,229,0.18)}50%{transform:scale(1.05);box-shadow:0 0 0 12px rgba(79,70,229,0)}}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.page-wrap{position:relative;width:100%;max-width:400px}
.ar-card{position:relative;text-align:center;padding:44px 32px 34px;background:#fff;border:1px solid rgba(0,0,0,0.06);border-radius:24px;box-shadow:0 1px 2px rgba(0,0,0,0.03),0 4px 16px rgba(0,0,0,0.04),0 16px 48px rgba(0,0,0,0.03);animation:cardIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards;opacity:0}
.eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#4F46E5;margin-bottom:18px;font-family:'SF Pro Text',system-ui,monospace}
.lock-ring{width:64px;height:64px;border-radius:50%;margin:0 auto 20px;background:rgba(79,70,229,0.06);border:1.5px solid rgba(79,70,229,0.12);display:flex;align-items:center;justify-content:center;animation:lockPulse 3s ease-in-out infinite}
.lock-ring svg{color:#4F46E5}
h2{margin:0 0 8px;font-size:22px;font-weight:700;color:#1d1d1f;font-family:'SF Pro Display',sans-serif;letter-spacing:-0.01em}
.desc{font-size:14px;color:#6e6e73;line-height:1.6;margin-bottom:24px;max-width:320px;margin-left:auto;margin-right:auto}
.status-box{padding:14px 16px;border-radius:12px;margin-bottom:24px;background:rgba(251,191,36,0.06);border:1px solid rgba(245,158,11,0.18)}
.status-box .label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#92400E;font-weight:700;margin-bottom:8px;opacity:0.7}
.status-badge{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:13px;color:#92400E;padding:4px 10px;border-radius:6px;background:rgba(251,191,36,0.08)}
.ar-btn{width:100%;display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:12px;font-weight:600;cursor:pointer;transition:transform .1s ease,box-shadow .2s ease,filter .2s ease,background .2s ease,border-color .2s ease}
.ar-btn:active{transform:scale(0.98)!important}
.btn-pay{padding:14px 20px;border:none;font-size:15px;color:#fff;background:#4F46E5;box-shadow:0 2px 8px rgba(79,70,229,0.2);margin-bottom:10px}
.btn-pay:hover{background:#4338CA;box-shadow:0 4px 20px rgba(79,70,229,0.3)}
.btn-out{padding:12px 20px;background:transparent;border:1.5px solid rgba(220,38,38,0.18);font-size:14px;font-weight:600;color:#DC2626}
.btn-out:hover{background:rgba(220,38,38,0.04);border-color:rgba(220,38,38,0.4);color:#B91C1C}
.trust{margin-top:22px;font-size:11px;color:#94a3b8;letter-spacing:0.02em;line-height:1.5}
@media(prefers-reduced-motion:reduce){.ar-card{animation:none;opacity:1}.lock-ring{animation:none!important}}
</style>
</head>
<body>
<div class="page-wrap">
  <div class="ar-card">
    <span class="eyebrow">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
      Accès restreint
    </span>
    <div class="lock-ring">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4F46E5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h2>Accès restreint</h2>
    <p class="desc">Votre abonnement n'est pas actif. Veuillez effectuer le paiement pour accéder à l'ensemble des fonctionnalités.</p>

    <div class="status-box">
      <span class="label">Statut de la preuve de paiement</span>
      <span class="status-badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        En attente de validation
      </span>
    </div>

    <button class="ar-btn btn-pay">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      <span>Procéder au paiement</span>
    </button>
    <button class="ar-btn btn-out">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>Se déconnecter</span>
    </button>
    <p class="trust">🔐 Connexion chiffrée · Données hébergées en Afrique de l'Est</p>
  </div>
</div>
</body>
</html>
