<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>OpaysFox — Assistant Vocal IA</title>
<style>
:root {
  --bg: #ffffff;
  --surface: #f5f5f7;
  --fg: #1d1d1f;
  --muted: #6e6e73;
  --accent: #4F46E5;
  --accent-glow: rgba(79,70,229,0.35);
  --cyan: #06b6d4;
  --radius-pill: 980px;
  --font-body: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:#111;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center}

/* Overlay plein écran verre dépoli */
.overlay{
  position:fixed;inset:0;z-index:9999;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;
}

/* Bouton fermer */
.close-btn{
  position:absolute;top:16px;right:16px;
  width:40px;height:40px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.15);color:#fff;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);
}
.close-btn:hover{background:rgba(255,255,255,0.25)}

/* Micro button + glow rings */
.mic-container{position:relative;width:140px;height:140px;margin-bottom:32px}
.mic-btn{
  width:100%;height:100%;border-radius:50%;border:none;
  background:var(--accent);color:#fff;font-size:32px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:2;
  box-shadow:0 8px 32px var(--accent-glow);
  transition:transform .2s;
}
.mic-btn:active{transform:scale(0.93)}
.mic-btn svg{width:48px;height:48px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Double pulse rings */
.ring{
  position:absolute;inset:-16px;border-radius:50%;
  border:2px solid rgba(79,70,229,0.4);
  animation:pulse 2.4s ease-out infinite;
}
.ring:nth-child(2){inset:-32px;animation-delay:0.8s;border-color:rgba(6,182,212,0.3)}
.ring:nth-child(3){inset:-48px;animation-delay:1.6s;border-color:rgba(79,70,229,0.2)}
@keyframes pulse{
  0%{transform:scale(0.85);opacity:1}
  100%{transform:scale(1.3);opacity:0}
}

/* Waveform bars */
.waveform{display:flex;align-items:center;gap:3px;height:48px;margin-bottom:28px}
.waveform .bar{
  width:4px;border-radius:4px;
  background:linear-gradient(180deg,var(--accent),var(--cyan));
  animation:wave 1s ease-in-out infinite alternate;
}
.waveform .bar:nth-child(1){height:12px;animation-delay:0s}
.waveform .bar:nth-child(2){height:24px;animation-delay:.1s}
.waveform .bar:nth-child(3){height:36px;animation-delay:.2s}
.waveform .bar:nth-child(4){height:20px;animation-delay:.3s}
.waveform .bar:nth-child(5){height:44px;animation-delay:.4s}
.waveform .bar:nth-child(6){height:28px;animation-delay:.5s}
.waveform .bar:nth-child(7){height:16px;animation-delay:.6s}
.waveform .bar:nth-child(8){height:38px;animation-delay:.7s}
.waveform .bar:nth-child(9){height:22px;animation-delay:.8s}
.waveform .bar:nth-child(10){height:32px;animation-delay:.9s}
.waveform .bar:nth-child(11){height:14px;animation-delay:1s}
.waveform .bar:nth-child(12){height:40px;animation-delay:1.1s}
@keyframes wave{
  0%{transform:scaleY(0.3)}
  100%{transform:scaleY(1)}
}

/* Texte transcription */
.transcript{
  font-size:22px;font-weight:300;letter-spacing:-0.3px;
  color:rgba(255,255,255,0.85);text-align:center;
  max-width:320px;line-height:1.4;
}
.transcript .label{font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}

/* Processing state */
.processing{display:none;flex-direction:column;align-items:center;gap:20px}
.processing.active{display:flex}
.listening-state.hidden{display:none}

.spinner{
  width:64px;height:64px;border-radius:50%;
  border:3px solid transparent;
  border-top-color:var(--accent);border-right-color:var(--cyan);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.processing-text{font-size:16px;color:rgba(255,255,255,0.7);text-align:center}

/* Tabs switching demo */
.demo-tabs{
  position:absolute;bottom:32px;
  display:flex;gap:12px;
}
.demo-tabs button{
  padding:8px 20px;border-radius:var(--radius-pill);border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);
  font-size:13px;cursor:pointer;backdrop-filter:blur(8px);
  transition:all .2s;
}
.demo-tabs button:hover,.demo-tabs button.active{
  background:rgba(255,255,255,0.18);color:#fff;border-color:rgba(255,255,255,0.4);
}

/* Status pill */
.status-pill{
  position:absolute;top:20px;left:50%;transform:translateX(-50%);
  padding:6px 16px;border-radius:var(--radius-pill);
  background:rgba(79,70,229,0.2);border:1px solid rgba(79,70,229,0.3);
  color:rgba(255,255,255,0.8);font-size:12px;letter-spacing:0.5px;
  backdrop-filter:blur(8px);
}
</style>
</head>
<body>
<div class="overlay">
  <button class="close-btn">✕</button>
  <div class="status-pill">ASSISTANT VOCAL — OPAYSFOX</div>

  <!-- Listening state -->
  <div class="listening-state" id="listeningState">
    <div class="mic-container">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <button class="mic-btn">
        <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
    </div>
    <div class="waveform">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <div class="transcript">
      <div class="label">Transcription</div>
      J'écoute...
    </div>
  </div>

  <!-- Processing state -->
  <div class="processing" id="processingState">
    <div class="spinner"></div>
    <div class="processing-text">Gemini analyse votre demande...</div>
  </div>

  <!-- Demo controls -->
  <div class="demo-tabs">
    <button class="active" onclick="showState('listening')">Écoute</button>
    <button onclick="showState('processing')">Traitement</button>
  </div>
</div>

<script>
function showState(state){
  const l=document.getElementById('listeningState');
  const p=document.getElementById('processingState');
  document.querySelectorAll('.demo-tabs button').forEach(b=>b.classList.remove('active'));
  if(state==='listening'){l.classList.remove('hidden');p.classList.remove('active');document.querySelectorAll('.demo-tabs button')[0].classList.add('active')}
  else{l.classList.add('hidden');p.classList.add('active');document.querySelectorAll('.demo-tabs button')[1].classList.add('active')}
}
</script>
</body>
</html>
