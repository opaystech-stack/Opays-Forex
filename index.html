<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo_fox-icone.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="OpaysFox - Tableau de bord de gestion de caisse et change multi-devises pour agents Mobile Money et bureaux de change." />
    <meta name="theme-color" content="#4F46E5" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>OpaysFox - Gestion Forex</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Version check and Service Worker management
      let currentVersion = null;

      async function checkVersion() {
        try {
          const res = await fetch('/version.json', { cache: 'no-store' });
          const data = await res.json();
          return data.timestamp || data.version;
        } catch (e) {
          console.error('Version check failed:', e);
          return null;
        }
      }

      async function handleVersionChange(newVersion) {
        if (currentVersion === null) {
          currentVersion = newVersion;
          return;
        }
        
        if (newVersion && newVersion !== currentVersion) {
          console.log('[App] New version detected, reloading...', { from: currentVersion, to: newVersion });
          currentVersion = newVersion;
          
          // Unregister all SWs to ensure clean reload
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(reg => reg.unregister()));
          
          // Clear all caches
          const cacheNames = await caches.keys();
          await Promise.all(cacheNames.map(name => caches.delete(name)));
          
          // Reload the page
          window.location.reload(true);
        }
      }

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            // Check initial version
            const version = await checkVersion();
            await handleVersionChange(version);
            
            // Register Service Worker with updateViaCache: none
            const reg = await navigator.serviceWorker.register('/sw.js', { 
              scope: '/',
              updateViaCache: 'none' 
            });
            console.log('[SW] Registered successfully', reg.scope);
            
            // Check for updates every 30 seconds
            setInterval(async () => {
              const newVersion = await checkVersion();
              await handleVersionChange(newVersion);
            }, 30000);
          } catch (err) {
            console.error('[SW] Registration error:', err);
          }
        });
      }
    </script>
  </body>
</html>
