<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OpaysFox — Wallets Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --indigo: #4F46E5;
  --indigo-deep: #4338CA;
  --indigo-soft: rgba(99,102,241,0.10);
  --indigo-glow: rgba(79,70,229,0.25);
  --green: #16a34a;
  --green-soft: rgba(22,163,74,0.10);
  --red: #DC2626;
  --red-soft: rgba(220,38,38,0.08);
  --orange: #EA580C;
  --orange-soft: rgba(234,88,12,0.08);
  --bg: #F1F5F9;
  --card: #ffffff;
  --border: #E2E8F0;
  --border-fine: rgba(226,232,240,0.7);
  --text: #0F172A;
  --text-2: #334155;
  --text-muted: #64748B;
  --shadow-sm: 0 1px 3px rgba(15,23,42,0.04), 0 4px 12px rgba(15,23,42,0.03);
  --shadow-md: 0 2px 8px rgba(15,23,42,0.05), 0 12px 32px rgba(15,23,42,0.06);
  --radius: 16px;
  --radius-sm: 12px;
  --sheet-height-collapsed: 55%;
  --sheet-height-expanded: 92%;
  --nav-h: 64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

/* CANVAS */
.canvas-layer{position:fixed;inset:0;z-index:1;padding:24px 20px 0;overflow:hidden;display:flex;flex-direction:column;align-items:center}
.canvas-patrimoine{text-align:center;margin-bottom:24px;padding-top:12px}
.canvas-patrimoine__label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:4px;display:block}
.canvas-patrimoine__value{font-size:42px;font-weight:800;color:var(--text);line-height:1.1;font-variant-numeric:tabular-nums;font-family:'Space Grotesk',sans-serif}
.canvas-patrimoine__delta{display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;color:var(--green);background:var(--green-soft)}
.canvas-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:12px;width:100%;max-width:400px}
.wallets-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:400px}
.wallet-card{display:flex;align-items:center;gap:10px;padding:14px;background:var(--card);border:1px solid var(--border-fine);border-radius:14px;cursor:pointer;box-shadow:var(--shadow-sm);transition:all .15s ease}
.wallet-card:active{transform:scale(0.97)}
.wallet-av{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.wallet-info{display:flex;flex-direction:column;min-width:0}
.wallet-name{font-size:11px;font-weight:600;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wallet-bal{font-size:14px;font-weight:800;color:var(--text);line-height:1.2;font-variant-numeric:tabular-nums;font-family:'Space Grotesk',sans-serif}

/* SEARCH BAR */
.search-float{position:fixed;top:12px;left:16px;right:16px;z-index:100;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:10px 14px;box-shadow:var(--shadow-md)}
.search-float__input{flex:1;border:none;outline:none;font-size:14px;font-weight:500;color:var(--text);background:transparent}
.search-float__input::placeholder{color:var(--text-muted)}
.search-float__btn{width:36px;height:36px;border-radius:10px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}
.search-float__btn.mic{background:var(--indigo);color:#fff}
.search-float__btn.profile{background:var(--indigo-soft);color:var(--indigo)}
.filter-pills{position:fixed;top:68px;left:16px;right:16px;z-index:99;display:flex;gap:8px;overflow-x:auto;padding:4px 0;scrollbar-width:none}
.filter-pills::-webkit-scrollbar{display:none}
.filter-pill{white-space:nowrap;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--card);color:var(--text-2);cursor:pointer;flex-shrink:0;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.filter-pill:hover,.filter-pill.active{background:var(--indigo);color:#fff;border-color:var(--indigo)}

/* BOTTOM SHEET */
.bottom-sheet{position:fixed;left:0;right:0;bottom:var(--nav-h);z-index:50;background:var(--card);border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(15,23,42,0.08),0 -12px 48px rgba(15,23,42,0.04);transition:transform .4s cubic-bezier(.32,.72,0,1);transform:translateY(calc(100% - var(--sheet-height-collapsed)));max-height:calc(100dvh - var(--nav-h) - 100px);overflow:hidden;display:flex;flex-direction:column}
.bottom-sheet.expanded{transform:translateY(calc(100% - var(--sheet-height-expanded)))}
.sheet-handle{display:flex;justify-content:center;padding:10px 0 6px;cursor:grab;flex-shrink:0}
.sheet-handle__bar{width:36px;height:4px;border-radius:4px;background:#CBD5E1}
.sheet-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 18px 24px;-webkit-overflow-scrolling:touch}

/* WALLET LIST IN SHEET */
.sheet-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sheet-header__title{font-size:15px;font-weight:800;color:var(--text)}
.sheet-header__count{font-size:11px;font-weight:700;color:var(--text-muted);background:var(--bg);padding:2px 8px;border-radius:10px}
.add-btn{padding:6px 14px;border-radius:20px;border:none;background:var(--indigo);color:#fff;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;transition:transform .12s}
.add-btn:hover{transform:scale(1.05)}

.wl-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg);border:1px solid var(--border-fine);border-radius:14px;margin-bottom:8px;transition:all .15s}
.wl-item:hover{box-shadow:var(--shadow-sm)}
.wl-badge{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.wl-body{flex:1;min-width:0}
.wl-name{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wl-meta{font-size:11px;color:var(--text-muted);margin-top:2px;font-weight:600}
.wl-right{text-align:right;flex-shrink:0}
.wl-balance{font-size:16px;font-weight:800;color:var(--text);font-family:'Space Grotesk',sans-serif;font-variant-numeric:tabular-nums}
.wl-actions{display:flex;gap:4px;margin-top:4px;justify-content:flex-end}
.wl-act{width:26px;height:26px;border-radius:8px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;transition:transform .12s,box-shadow .12s}
.wl-act:hover{transform:scale(1.12);box-shadow:0 2px 8px rgba(0,0,0,0.12)}
.wl-act.capital{background:var(--indigo-soft);color:var(--indigo)}
.wl-act.edit{background:rgba(245,158,11,0.12);color:#D97706}
.wl-act.del{background:var(--red-soft);color:var(--red)}

/* ACCORDION FORM */
.accordion{overflow:hidden;max-height:0;transition:max-height .35s ease;margin:-4px 0 8px}
.accordion.open{max-height:300px}
.accordion-form{padding:12px 14px;border-radius:12px;border:1px solid}
.accordion-form input,.accordion-form select{width:100%;padding:8px 12px;font-size:13px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;outline:none;font-family:inherit}
.accordion-form input:focus,.accordion-form select:focus{border-color:var(--indigo);box-shadow:0 0 0 3px var(--indigo-soft)}
.form-row{display:flex;gap:8px}
.form-row>*{flex:1}
.form-submit{width:100%;padding:9px;border:none;border-radius:10px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;transition:opacity .15s}

/* FAB */
.wa-fab{position:fixed;bottom:calc(var(--nav-h) + 16px);right:16px;z-index:200;width:56px;height:56px;border-radius:50%;border:none;background:#25D366;color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(37,211,102,0.3),0 8px 32px rgba(0,0,0,0.1);cursor:pointer;transition:transform .15s}
.wa-fab:hover{transform:scale(1.08)}
.wa-fab__badge{position:absolute;top:-2px;right:-2px;width:20px;height:20px;border-radius:50%;background:var(--red);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--card)}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:300;height:var(--nav-h);background:var(--card);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:0 8px;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;border-radius:12px;cursor:pointer;transition:background .15s;border:none;background:none}
.nav-item:hover{background:var(--indigo-soft)}
.nav-item.active .nav-icon,.nav-item.active .nav-label{color:var(--indigo)}
.nav-icon{font-size:20px;color:var(--text-muted);line-height:1}
.nav-label{font-size:10px;font-weight:600;color:var(--text-muted)}
.nav-center{width:48px;height:48px;border-radius:50%;background:var(--indigo);color:#fff;font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;box-shadow:0 4px 12px var(--indigo-glow);transition:transform .15s;margin-top:-16px}
.nav-center:hover{transform:scale(1.08)}

@media(min-width:769px){
  .canvas-layer{padding-top:80px}
  .search-float{max-width:480px;left:50%;right:auto;transform:translateX(-50%)}
  .filter-pills{max-width:500px;left:50%;right:auto;transform:translateX(-50%)}
  .bottom-sheet{max-width:420px;left:50%;right:auto;transform:translateX(-50%) translateY(calc(100% - var(--sheet-height-collapsed)));border-radius:20px 20px 0 0}
  .bottom-sheet.expanded{transform:translateX(-50%) translateY(calc(100% - var(--sheet-height-expanded)))}
  .bottom-nav{max-width:420px;left:50%;transform:translateX(-50%);border-radius:16px 16px 0 0}
  .wa-fab{right:calc(50% - 230px)}
}
</style>
</head>

<script>
(function(){
  const sheet = document.getElementById('sheet');
  const handle = document.getElementById('sheetHandle');
  handle.addEventListener('click', () => sheet.classList.toggle('expanded'));

  // Touch drag
  let startY=0, dragging=false;
  handle.addEventListener('touchstart', e => { dragging=true; startY=e.touches[0].clientY; sheet.style.transition='none'; });
  document.addEventListener('touchmove', e => { if(!dragging) return; });
  document.addEventListener('touchend', e => {
    if(!dragging) return; dragging=false;
    sheet.style.transition='';
    const diff = e.changedTouches[0].clientY - startY;
    if(diff < -50) sheet.classList.add('expanded');
    else if(diff > 50) sheet.classList.remove('expanded');
  });

  // Add form toggle
  document.getElementById('addToggle').addEventListener('click', () => {
    document.getElementById('addAccordion').classList.toggle('open');
  });

  // Accordion toggles for wallet actions
  document.querySelectorAll('.wl-act.capital').forEach(btn => {
    btn.addEventListener('click', () => {
      const w = btn.dataset.wallet;
      if(!w) return;
      const acc = document.getElementById('acc-'+w+'-capital');
      if(acc) acc.classList.toggle('open');
      const edit = document.getElementById('acc-'+w+'-edit');
      if(edit) edit.classList.remove('open');
    });
  });
  document.querySelectorAll('.wl-act.edit').forEach(btn => {
    btn.addEventListener('click', () => {
      const w = btn.dataset.wallet;
      if(!w) return;
      const acc = document.getElementById('acc-'+w+'-edit');
      if(acc) acc.classList.toggle('open');
      const cap = document.getElementById('acc-'+w+'-capital');
      if(cap) cap.classList.remove('open');
    });
  });
})();
</script>
</body>
</html>
